services:
  summary:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AGENT_NAME=summary
      - OPENAI_API_KEY=${LLM_API_KEY}
      - MINIMAX_API_KEY=${LLM_API_KEY}
    volumes:
      - ./scripts/start_nanobot.sh:/start_nanobot.sh:ro
      - ./configs/nanobot.summary.json:/app/configs/nanobot.summary.json:ro
      - ./agents/summary/.nanobot:/root/.nanobot
    command: ["/bin/bash", "/start_nanobot.sh"]
    ports:
      - "8001:8000"

  site_maintainer:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AGENT_NAME=site_maintainer
      - OPENAI_API_KEY=${LLM_API_KEY}
      - MINIMAX_API_KEY=${LLM_API_KEY}
    volumes:
      - ./scripts/start_nanobot.sh:/start_nanobot.sh:ro
      - ./configs/nanobot.site_maintainer.json:/app/configs/nanobot.site_maintainer.json:ro
      - ./agents/site_maintainer/.nanobot:/root/.nanobot
    command: ["/bin/bash", "/start_nanobot.sh"]
    ports:
      - "8002:8000"

  feishu_doc:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AGENT_NAME=feishu_doc
      - OPENAI_API_KEY=${LLM_API_KEY}
      - MINIMAX_API_KEY=${LLM_API_KEY}
    volumes:
      - ./scripts/start_nanobot.sh:/start_nanobot.sh:ro
      - ./configs/nanobot.feishu_doc.json:/app/configs/nanobot.feishu_doc.json:ro
      - ./agents/feishu_doc/.nanobot:/root/.nanobot
    command: ["/bin/bash", "/start_nanobot.sh"]
    ports:
      - "8003:8000"
